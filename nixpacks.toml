# Nixpacks config para Railway.
# Añade las librerías de sistema que Chromium (puppeteer) necesita en Linux.
# Sin esto, puppeteer.launch() falla con "error while loading shared libraries".

[phases.setup]
# Ubuntu Noble (24.04) renombró libasound2 → libasound2t64.
# Solo añadimos lo que NO está ya en la setup default de Nixpacks.
aptPkgs = [
  "...",
  "chromium",
  "fonts-liberation",
  "fonts-noto-color-emoji",
  "libdbus-1-3",
  "libdrm2",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libxkbcommon0",
  "ca-certificates"
]

[variables]
# Le decimos a puppeteer que use el Chromium del sistema (instalado vía apt arriba)
# en vez de descargar uno propio. Esto reduce el tamaño del build y evita el
# download de ~170MB en cada deploy.
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
