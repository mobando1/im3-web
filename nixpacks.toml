# Nixpacks config para Railway.
# Añade las librerías de sistema que Chromium (puppeteer) necesita en Linux.
# Sin esto, puppeteer.launch() falla con "error while loading shared libraries".

[phases.setup]
aptPkgs = [
  "...",
  "chromium",
  "fonts-liberation",
  "fonts-noto-color-emoji",
  "libnss3",
  "libxss1",
  "libasound2",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libgtk-3-0",
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libxkbcommon0",
  "libxshmfence1",
  "ca-certificates"
]

[variables]
# Le decimos a puppeteer que use el Chromium del sistema (instalado vía apt arriba)
# en vez de descargar uno propio. Esto reduce el tamaño del build y evita el
# download de ~170MB en cada deploy.
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
